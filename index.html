<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Mistlewood on YouTube</title>
<style>
  :root {
    --bg: #0b0b0c;
    --accent: #ff3b30;
    --text: #f5f5f5;
    --muted: #9a9a9a;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  .play-icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .play-icon svg {
    width: 26px;
    height: 26px;
    fill: white;
    margin-left: 3px;
  }
  .spinner {
    width: 22px;
    height: 22px;
    border: 3px solid rgba(255, 255, 255, 0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.2px;
  }
  a.fallback {
    color: var(--accent);
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  a.fallback.visible {
    opacity: 1;
    pointer-events: auto;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="play-icon">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <div class="spinner"></div>
    <p>Opening Mistlewood YouTube&hellip;</p>
    <a class="fallback" id="manualLink" href="#">Tap here if nothing happens</a>
  </div>
  <script src="script.js"></script>
</body>
</html>
